<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocal Tone Judge</title>
  <style>
    :root {
      --bg-0: #0b0f14;
      --bg-1: #141b24;
      --bg-2: #1b2633;
      --line: #2b3a4d;
      --text: #e8f0ff;
      --muted: #9aa8bf;
      --accent: #57d7ff;
      --good: #33d188;
      --warn: #ffc14d;
      --bad: #ff6b7a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #1b2532 0%, transparent 40%),
        radial-gradient(circle at 85% 20%, #1d2f45 0%, transparent 35%),
        linear-gradient(150deg, var(--bg-0), var(--bg-1) 45%, var(--bg-2));
      padding: 20px;
    }

    .card {
      width: min(700px, 100%);
      background: rgba(12, 16, 22, 0.78);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .title {
      font-size: clamp(1.4rem, 1.1rem + 1.2vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.45;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #3b4d62;
      border-radius: 12px;
      padding: 10px 16px;
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    #startBtn {
      background: linear-gradient(120deg, #0a3a4f, #0b5775);
    }

    #stopBtn {
      background: linear-gradient(120deg, #4f1922, #722231);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(87, 215, 255, 0.16);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .meter-wrap {
      margin-bottom: 16px;
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .meter {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #0d141e;
      border: 1px solid #263446;
      overflow: hidden;
    }

    .meter > div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #22c1ff, #35f0ac);
      transition: width 0.12s linear;
    }

    .results {
      margin-top: 10px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
      display: grid;
      gap: 10px;
    }

    .tone {
      font-size: 1.15rem;
      font-weight: 700;
    }

    .tone.good {
      color: var(--good);
    }

    .tone.warn {
      color: var(--warn);
    }

    .tone.bad {
      color: var(--bad);
    }

    .tiny {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="title">Vocal Tone Judge</h1>
    <p class="subtitle">
      Speak into your microphone for a few seconds. This page estimates tone from volume stability and pitch range.
    </p>

    <div class="controls">
      <button id="startBtn" type="button">Start Listening</button>
      <button id="stopBtn" type="button" disabled>Stop & Judge</button>
    </div>

    <div class="meter-wrap">
      <div class="label-row">
        <span>Live input level</span>
        <span id="levelValue">0%</span>
      </div>
      <div class="meter"><div id="levelBar"></div></div>
    </div>

    <section class="results">
      <div id="toneResult" class="tone">Result: Waiting for sample...</div>
      <div id="detailResult" class="tiny">Pitch: -- Hz | Stability: -- | Intensity: --</div>
      <div class="tiny">
        Note: this is a signal-based estimate, not a clinical emotion detector.
      </div>
    </section>
  </main>

  <script>
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const levelBar = document.getElementById("levelBar");
    const levelValue = document.getElementById("levelValue");
    const toneResult = document.getElementById("toneResult");
    const detailResult = document.getElementById("detailResult");

    let audioCtx;
    let analyser;
    let source;
    let stream;
    let rafId;
    let collecting = false;

    const samples = {
      rms: [],
      pitch: []
    };

    function autoCorrelate(buffer, sampleRate) {
      let rms = 0;
      for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
      rms = Math.sqrt(rms / buffer.length);
      if (rms < 0.01) return -1;

      let r1 = 0;
      let r2 = buffer.length - 1;
      const threshold = 0.2;
      for (let i = 0; i < buffer.length / 2; i++) {
        if (Math.abs(buffer[i]) < threshold) {
          r1 = i;
          break;
        }
      }
      for (let i = 1; i < buffer.length / 2; i++) {
        if (Math.abs(buffer[buffer.length - i]) < threshold) {
          r2 = buffer.length - i;
          break;
        }
      }

      const trimmed = buffer.slice(r1, r2);
      const c = new Array(trimmed.length).fill(0);
      for (let i = 0; i < trimmed.length; i++) {
        for (let j = 0; j < trimmed.length - i; j++) {
          c[i] += trimmed[j] * trimmed[j + i];
        }
      }

      let d = 0;
      while (c[d] > c[d + 1]) d++;
      let maxVal = -1;
      let maxPos = -1;
      for (let i = d; i < c.length; i++) {
        if (c[i] > maxVal) {
          maxVal = c[i];
          maxPos = i;
        }
      }
      if (maxPos <= 0) return -1;
      return sampleRate / maxPos;
    }

    function classifyTone(avgRms, rmsStdDev, avgPitch, pitchStdDev) {
      if (avgRms < 0.03) {
        return {
          label: "Calm / Soft",
          className: "good"
        };
      }

      if (avgRms > 0.12 || pitchStdDev > 65) {
        return {
          label: "Intense / Energetic",
          className: "warn"
        };
      }

      if (rmsStdDev > 0.04 || pitchStdDev > 40) {
        return {
          label: "Uneven / Stressed",
          className: "bad"
        };
      }

      if (avgPitch > 210 && avgRms > 0.08) {
        return {
          label: "Confident / Forward",
          className: "good"
        };
      }

      return {
        label: "Neutral / Balanced",
        className: "good"
      };
    }

    function analyzeFrame() {
      if (!collecting || !analyser) return;

      const timeData = new Float32Array(analyser.fftSize);
      analyser.getFloatTimeDomainData(timeData);

      let sumSquares = 0;
      for (let i = 0; i < timeData.length; i++) {
        sumSquares += timeData[i] * timeData[i];
      }
      const rms = Math.sqrt(sumSquares / timeData.length);
      const levelPct = Math.min(100, Math.round(rms * 350));
      levelBar.style.width = levelPct + "%";
      levelValue.textContent = levelPct + "%";

      const pitch = autoCorrelate(timeData, audioCtx.sampleRate);
      if (rms > 0.012) samples.rms.push(rms);
      if (pitch > 50 && pitch < 500) samples.pitch.push(pitch);

      rafId = requestAnimationFrame(analyzeFrame);
    }

    function mean(arr) {
      if (!arr.length) return 0;
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function stdDev(arr, avg) {
      if (!arr.length) return 0;
      const variance = arr.reduce((acc, val) => acc + (val - avg) ** 2, 0) / arr.length;
      return Math.sqrt(variance);
    }

    async function startListening() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);

        samples.rms = [];
        samples.pitch = [];
        collecting = true;

        toneResult.className = "tone";
        toneResult.textContent = "Result: Listening...";
        detailResult.textContent = "Pitch: collecting... | Stability: collecting... | Intensity: collecting...";

        startBtn.disabled = true;
        stopBtn.disabled = false;
        analyzeFrame();
      } catch (error) {
        toneResult.className = "tone bad";
        toneResult.textContent = "Result: Microphone access denied or unavailable.";
        detailResult.textContent = "Check browser permissions and try again.";
      }
    }

    function stopListening() {
      collecting = false;
      cancelAnimationFrame(rafId);
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
      if (audioCtx && audioCtx.state !== "closed") {
        audioCtx.close();
      }

      startBtn.disabled = false;
      stopBtn.disabled = true;

      if (!samples.rms.length) {
        toneResult.className = "tone bad";
        toneResult.textContent = "Result: No clear voice sample captured.";
        detailResult.textContent = "Try speaking louder and closer to the microphone.";
        levelBar.style.width = "0%";
        levelValue.textContent = "0%";
        return;
      }

      const avgRms = mean(samples.rms);
      const rmsStd = stdDev(samples.rms, avgRms);
      const avgPitch = mean(samples.pitch);
      const pitchStd = stdDev(samples.pitch, avgPitch);
      const judgment = classifyTone(avgRms, rmsStd, avgPitch, pitchStd);

      toneResult.className = "tone " + judgment.className;
      toneResult.textContent = "Result: " + judgment.label;
      detailResult.textContent =
        "Pitch: " + (avgPitch ? avgPitch.toFixed(1) : "--") + " Hz" +
        " | Stability: " + (1 - Math.min(1, rmsStd * 14)).toFixed(2) +
        " | Intensity: " + Math.min(1, avgRms * 8.5).toFixed(2);
    }

    startBtn.addEventListener("click", startListening);
    stopBtn.addEventListener("click", stopListening);
  </script>
</body>
</html>
